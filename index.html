<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palm Valley Church — Holiday Attendance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root {
    --bg: #ffffff; --card: #f7f8fa; --border: #e2e4e9;
    --text: #1a1a1a; --muted: #6b7280; --accent: #4a7f97;
    --mission: #4a7f97; --edinburg: #7b6fa6; --spanish: #c47a2e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  header { padding:32px 40px 16px; text-align:center; }
  header p { color:var(--muted); margin-top:6px; font-size:15px; }

  /* ── Tab Navigation ── */
  .tab-nav { display:flex; justify-content:center; gap:12px; padding:16px 40px 0; flex-wrap:wrap; border-bottom:1px solid var(--border); }
  .tab-btn {
    padding:10px 24px; border-radius:20px; border:2px solid var(--border);
    background:var(--card); color:var(--muted); cursor:pointer;
    font-size:14px; font-weight:600; transition:all .2s;
  }
  .tab-btn:hover { border-color:var(--accent); color:var(--text); }
  .tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .controls { display:flex; justify-content:center; gap:10px; padding:12px 40px 24px; flex-wrap:wrap; }
  .controls button {
    padding:8px 18px; border-radius:8px; border:1px solid var(--border);
    background:var(--card); color:var(--muted); cursor:pointer;
    font-size:13px; font-weight:500; transition:all .2s;
  }
  .controls button:hover { border-color:var(--accent); color:var(--text); }
  .controls button.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }

  .kpi-section { max-width:1440px; margin:0 auto; padding:0 40px; }
  .kpi-section h3 { font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; margin-top:20px; }
  .kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:8px; }
  .kpi { background:var(--card); border-radius:12px; padding:16px; border:1px solid var(--border); text-align:center; }
  .kpi .value { font-size:28px; font-weight:700; }
  .kpi .value.mission { color:var(--mission); }
  .kpi .value.edinburg { color:var(--edinburg); }
  .kpi .value.spanish { color:var(--spanish); }
  .kpi .value.total { color:var(--accent); }
  .kpi .label { font-size:12px; color:var(--muted); margin-top:3px; }
  .kpi .change { font-size:13px; margin-top:4px; font-weight:600; }
  .kpi .change.up { color:#2e7d5b; }
  .kpi .change.down { color:#c0392b; }
  .kpi .change.neutral { color:var(--muted); }

  .grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; padding:24px 40px 40px; max-width:1440px; margin:0 auto; }
  .card { background:var(--card); border-radius:16px; padding:24px; border:1px solid var(--border); }
  .card.full { grid-column:1/-1; }
  .card h2 { font-size:16px; font-weight:600; margin-bottom:4px; color:var(--text); }
  .card .subtitle { font-size:13px; color:var(--muted); margin-bottom:16px; }
  .chart-wrap { position:relative; width:100%; }
  .chart-wrap.tall { height:420px; }
  .chart-wrap.medium { height:360px; }

  select.year-select, select.growth-select {
    padding:6px 12px; border-radius:6px; border:1px solid var(--border);
    background:#fff; color:var(--text); font-size:13px; cursor:pointer;
    margin-left:8px; vertical-align:middle;
  }
  select.year-select:focus, select.growth-select:focus { outline:none; border-color:var(--accent); }
  .svc-controls, .growth-controls { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .svc-controls label, .growth-controls label { font-size:13px; color:var(--muted); font-weight:500; }

  .campus-section { margin-top:8px; }
  .campus-section h3 { font-size:15px; font-weight:600; margin:20px 0 8px; padding-left:8px; border-left:3px solid var(--muted); }
  .campus-section h3.mission-label { border-color:var(--mission); }
  .campus-section h3.edinburg-label { border-color:var(--edinburg); }
  .campus-section h3.spanish-label { border-color:var(--spanish); }

  /* ── Tab Visibility ── */
  #holidaySection { display:block; }
  #eventRegSection { display:none; }
  #eventRegSection.active { display:block; }
  #dreamTeamSection { display:none; }
  #dreamTeamSection.active { display:block; }
  #holidaySection.hidden { display:none; }

  /* ── Dream Team Specific ── */
  .funnel-bar { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .funnel-bar .bar-label { width:180px; font-size:13px; font-weight:500; text-align:right; color:var(--text); flex-shrink:0; }
  .funnel-bar .bar-track { flex:1; height:36px; background:#eee; border-radius:8px; overflow:hidden; position:relative; }
  .funnel-bar .bar-fill { height:100%; border-radius:8px; display:flex; align-items:center; padding-left:12px; font-size:13px; font-weight:700; color:#fff; transition:width .6s ease; min-width:40px; }
  .funnel-bar .bar-value { font-size:14px; font-weight:700; width:80px; text-align:left; color:var(--text); flex-shrink:0; }
  .conversion-card { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-top:12px; }
  .conversion-card .campus-block { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
  .conversion-card .campus-block .campus-name { font-size:14px; font-weight:600; margin-bottom:8px; }
  .conversion-card .campus-block .big-num { font-size:36px; font-weight:800; }
  .conversion-card .campus-block .detail { font-size:12px; color:var(--muted); margin-top:4px; }
  .dt-table { width:100%; border-collapse:collapse; margin-top:12px; }
  .dt-table th { text-align:left; padding:10px 12px; font-size:12px; color:var(--muted); border-bottom:2px solid var(--border); text-transform:uppercase; letter-spacing:.5px; }
  .dt-table td { padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; }
  .dt-table td.number { text-align:right; font-variant-numeric:tabular-nums; }
  .dt-table tr:hover { background:#f0f4f8; }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
  .badge.high { background:#d4edda; color:#155724; }
  .badge.mid { background:#fff3cd; color:#856404; }
  .badge.low { background:#f8d7da; color:#721c24; }
  .dt-table tbody tr.event-row { cursor:pointer; }
.dt-table tbody tr.event-row:hover { background:#e8f0f4; }
.dt-table tbody tr.event-row td:first-child::before { content:'▶ '; font-size:10px; color:var(--muted); transition:transform .2s; display:inline-block; margin-right:4px; }
.dt-table tbody tr.event-row.expanded td:first-child::before { content:'▼ '; }
.person-rows { display:none; }
.person-rows.visible { display:table-row-group; }
.person-row td { padding:6px 12px 6px 28px; font-size:12px; border-bottom:1px solid #f0f0f0; color:var(--muted); }
.person-row td:first-child { padding-left:32px; }
.person-row .serving-badge { display:inline-block; padding:1px 6px; border-radius:8px; font-size:10px; font-weight:600; background:#d4edda; color:#155724; }
  
  @media (max-width:900px) {
    .conversion-card { grid-template-columns:1fr; }
    .funnel-bar .bar-label { width:100px; font-size:11px; }
  }

  .event-table { width:100%; border-collapse:collapse; margin-top:12px; }
  .event-table th { background:var(--card); border-bottom:2px solid var(--border); padding:12px; text-align:left; font-size:13px; font-weight:600; color:var(--muted); }
  .event-table td { padding:12px; border-bottom:1px solid var(--border); font-size:13px; }
  .event-table tr:hover { background:var(--card); }
  .event-table .name { font-weight:600; color:var(--text); }
  .event-table .number { text-align:right; color:var(--accent); }
  .event-table .cancel-rate { color:#c0392b; }

  @media (max-width:900px) {
    .grid { grid-template-columns:1fr; padding:0 16px 24px; }
    .kpi-section { padding:0 16px; }
    header { padding:24px 16px 12px; }
    .controls { padding:8px 16px 16px; }
    .tab-nav { padding:12px 16px 0; }
  }

  /* ── PDF Download Button ── */
  #pdfBtn {
    display:inline-flex; align-items:center; gap:7px;
    padding:9px 20px; border-radius:8px;
    background:#1a1a1a; color:#fff; border:none;
    font-size:13px; font-weight:600; cursor:pointer;
    transition:background .2s; margin-top:12px;
    box-shadow:0 1px 4px rgba(0,0,0,.15);
  }
  #pdfBtn:hover { background:#333; }
  #pdfBtn svg { flex-shrink:0; }

  /* ── Print / PDF styles ── */
  @media print {
    @page { margin:10mm 12mm; size:A4 landscape; }

    /* Hide interactive controls and tabs */
    #pdfBtn, #attModeToggle, #yearSelector, .controls, .tab-nav,
    .svc-controls, .growth-controls { display:none !important; }

    body { background:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }

    /* Only print active tab content */
    #holidaySection.hidden, #eventRegSection:not(.active), #dreamTeamSection:not(.active) { display:none !important; }

    /* Header compact */
    header { padding:8px 12px 6px !important; }
    header img { height:36px !important; }
    header p { font-size:13px !important; margin-top:3px !important; }

    /* KPI section */
    .kpi-section { padding:0 12px !important; }
    .kpi-section h3 { margin-top:10px !important; margin-bottom:6px !important; font-size:12px !important; }
    .kpi-row { gap:8px !important; margin-bottom:4px !important; }
    .kpi { padding:10px 8px !important; }
    .kpi .value { font-size:22px !important; }
    .kpi .label { font-size:11px !important; }
    .kpi .change { font-size:11px !important; }

    /* Force grid to block — kills the 2-col layout entirely */
    .grid { display:block !important; padding:0 12px !important; }

    /* Each card gets its own page */
    .card {
      display:block !important;
      width:100% !important;
      box-sizing:border-box !important;
      box-shadow:none !important;
      border:1px solid #ddd !important;
      border-radius:8px !important;
      padding:16px !important;
      margin:0 !important;
      page-break-before:always !important;
      break-before:page !important;
      page-break-inside:avoid !important;
      break-inside:avoid !important;
    }
    .card:first-child { page-break-before:auto !important; break-before:auto !important; }

    .card h2 { font-size:15px !important; margin-bottom:2px !important; }
    .card .subtitle { font-size:12px !important; margin-bottom:10px !important; }

    /* Charts fill available height */
    .chart-wrap { position:relative !important; width:100% !important; }
    .chart-wrap.tall { height:390px !important; }
    .chart-wrap.medium { height:350px !important; }

    /* Sub-sections inside full-width cards */
    .campus-section { margin-top:6px !important; }
    .campus-section h3 { font-size:13px !important; margin:10px 0 6px !important; }
    .campus-section + .campus-section {
      page-break-before:always !important;
      break-before:page !important;
    }

    /* Event table printing */
    .event-table { page-break-inside:avoid !important; }
    .event-table th, .event-table td { padding:8px !important; font-size:11px !important; }
  }
</style>
</head>

<header>

  <p id="headerTitle">Holiday Attendance Dashboard — 2020–2026</p>
  <div id="yearSelector" style="margin-top:14px; display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;"></div>
  <div id="attModeToggle" style="margin-top:10px; display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:4px;"></div>
  <div style="margin-top:4px;">
    <button id="pdfBtn" onclick="window.print()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download PDF
    </button>
  </div>
</header>

<!-- ── Tab Navigation ── -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('holiday')">Holiday Attendance</button>
  <button class="tab-btn" onclick="switchTab('event')">Event Registrations</button>
  <button class="tab-btn" onclick="switchTab('dreamteam')">Dream Team</button>
</div>

<!-- ── HOLIDAY ATTENDANCE TAB ── -->
<div id="holidaySection">
  <div class="controls" id="holidayFilter"></div>
  <div class="kpi-section" id="kpiSection"></div>
  <div class="grid" id="mainGrid"></div>
</div>

<!-- ── EVENT REGISTRATIONS TAB ── -->
<div id="eventRegSection">
  <div class="kpi-section" id="eventKpiSection"></div>
  <div class="grid" id="eventGrid"></div>
</div>

<!-- ── DREAM TEAM TAB ── -->
<div id="dreamTeamSection">
  <div class="kpi-section" id="dtKpiSection"></div>
  <div class="grid" id="dtGrid"></div>
</div>

<script>
Chart.register(ChartDataLabels);

function switchTab(tab) {
  const holidaySection = document.getElementById('holidaySection');
  const eventRegSection = document.getElementById('eventRegSection');
  const dreamTeamSection = document.getElementById('dreamTeamSection');
  const tabBtns = document.querySelectorAll('.tab-btn');

  // Hide all
  holidaySection.classList.add('hidden');
  eventRegSection.classList.remove('active');
  dreamTeamSection.classList.remove('active');
  tabBtns.forEach(b => b.classList.remove('active'));

  if (tab === 'holiday') {
    holidaySection.classList.remove('hidden');
    document.getElementById('headerTitle').textContent = 'Holiday Attendance Dashboard — 2020–2026';
    tabBtns[0].classList.add('active');
  } else if (tab === 'event') {
    eventRegSection.classList.add('active');
    document.getElementById('headerTitle').textContent = 'Event Registrations Dashboard';
    tabBtns[1].classList.add('active');
  } else if (tab === 'dreamteam') {
    dreamTeamSection.classList.add('active');
    document.getElementById('headerTitle').textContent = 'Dream Team — Growth Track Step 3 Pipeline';
    tabBtns[2].classList.add('active');
  }
}

const data = raw.map(r => ({
  holiday:r.h, date:r.d, year:r.y, campus:r.c,
  service:r.s, time:r.t, attendance:r.a, totalAttendance:r.ta, rsvp:r.r, day:r.w
})).filter(r => r.attendance > 0);

const campusColors = { Mission:'#4a7f97', Edinburg:'#7b6fa6', Spanish:'#c47a2e' };
const campusOrder = ['Mission','Edinburg','Spanish'];

let attMode = 'auditorium';

function holidayType(h) { return h.replace(/^\d{4}\s+/,''); }
function num(n) { return n.toLocaleString(); }
function numShort(n) { return n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/,'')+'k' : n.toString(); }

function attVal(r) {
  if (attMode === 'total' && r.totalAttendance !== null) return r.totalAttendance;
  return r.attendance;
}

function sumAtt(rows) { return rows.reduce((s,r) => s + attVal(r), 0); }
function sumAuditorium(rows) { return rows.reduce((s,r) => s + r.attendance, 0); }
function sumTotal(rows) { return rows.reduce((s,r) => s + (r.totalAttendance || 0), 0); }
function sumRsvp(rows) { return rows.reduce((s,r) => s + r.rsvp, 0); }

function aggregate(rows, keys) {
  const map = {};
  rows.forEach(r => {
    const k = keys.map(key => key === 'ht' ? holidayType(r.holiday) : r[key]).join('|');
    if (!map[k]) map[k] = { ...r, attendance:0, totalAttendance:0, rsvp:0, ht: holidayType(r.holiday) };
    map[k].attendance += r.attendance;
    map[k].totalAttendance += (r.totalAttendance || 0);
    map[k].rsvp += r.rsvp;
  });
  return Object.values(map);
}

const dlDefaults = {
  anchor:'end', align:'end', color:'#444', font:{size:10, weight:'600'},
  formatter: v => v > 0 ? numShort(v) : '',
  display: ctx => ctx.dataset.data[ctx.dataIndex] > 0
};

      selectedYear = y;
      svcSelectedYear = y;
      render();
    };
    container.appendChild(btn);
  });
})();

(function buildAttModeToggle() {
  const container = document.getElementById('attModeToggle');
  if (!container) return;
  [{v:'auditorium', label:'Auditorium Attendance'},{v:'total', label:'Total Attendance'}].forEach(opt => {
    const btn = document.createElement('button');
    btn.textContent = opt.label;
    btn.dataset.mode = opt.v;
    btn.style.cssText = 'padding:6px 18px; border-radius:20px; border:2px solid var(--border); background:var(--card); color:var(--muted); cursor:pointer; font-size:13px; font-weight:600; transition:all .2s; margin:0 4px;';

      attMode = opt.v;
      container.querySelectorAll('button').forEach(b => {
        const active = b.dataset.mode === attMode;
        b.style.background = active ? '#2e7d5b' : 'var(--card)';

        b.style.borderColor = active ? '#2e7d5b' : 'var(--border)';
      });

    };

  note.style.cssText = 'font-size:11px; color:var(--muted); margin-left:8px; font-style:italic;';
  note.textContent = '* Total Attendance tracked from 2025 Good Friday onward';

})();

Chart.defaults.color = '#6b7280';
Chart.defaults.borderColor = '#e5e7eb';
Chart.defaults.font.family = "'Segoe UI',system-ui,sans-serif";
Chart.defaults.plugins.datalabels = { display: false };

const filterEl = document.getElementById('holidayFilter');
['All','Good Friday','Easter','Christmas Eve'].forEach(h => {
  const btn = document.createElement('button');
  btn.textContent = h === 'All' ? 'All Holidays' : h;
  btn.dataset.holiday = h;
  btn.onclick = () => { activeHoliday = h; render(); };
  filterEl.appendChild(btn);
});

function filtered() {
  if (activeHoliday === 'All') return data;
  return data.filter(r => holidayType(r.holiday) === activeHoliday);
}

function destroyAll() { Object.values(charts).forEach(c => { if (c && c.destroy) c.destroy(); }); charts = {}; }

function makeCanvas(id, cls) {
  const wrap = document.createElement('div');
  wrap.className = 'chart-wrap ' + (cls || 'tall');
  const canvas = document.createElement('canvas');
  canvas.id = id;
  wrap.appendChild(canvas);
  return { wrap, canvas };
}

function card(title, subtitle, full) {
  const div = document.createElement('div');
  div.className = 'card' + (full ? ' full' : '');
  div.innerHTML = `<h2>${title}</h2><div class="subtitle">${subtitle}</div>`;
  return div;
}

function render() {
  destroyAll();
  const d = filtered();
  const grid = document.getElementById('mainGrid');
  grid.innerHTML = '';
  filterEl.querySelectorAll('button').forEach(b =>
    b.classList.toggle('active', b.dataset.holiday === activeHoliday)
  );
  document.getElementById('yearSelector').querySelectorAll('button').forEach(b => {
    const isActive = b.dataset.year === selectedYear;
    b.style.background = isActive ? 'var(--accent)' : 'var(--card)';
    b.style.color = isActive ? '#fff' : 'var(--muted)';
    b.style.borderColor = isActive ? 'var(--accent)' : 'var(--border)';
  });
  renderKPIs(d);
  renderYoYChart(d, grid);
  renderVsChart(d, grid);
  renderRsvpChart(d, grid);
  renderServiceVsLYChart(d, grid);
  renderCampusSubCharts(d, grid);
  renderGrowthChart(grid);
}

function renderKPIs(d) {
  const section = document.getElementById('kpiSection');
  section.innerHTML = '';
  const latestYr = selectedYear;
  const prevYr = String(+latestYr - 1);

  const t2 = sumAtt(d.filter(r=>r.year===latestYr));
  const t1 = sumAtt(d.filter(r=>r.year===prevYr));
  const rsvp2 = sumRsvp(d.filter(r=>r.year===latestYr&&r.rsvp>0));
  const act2 = sumAtt(d.filter(r=>r.year===latestYr&&r.rsvp>0));
  const yoy = t1>0 ? ((t2-t1)/t1*100).toFixed(1) : null;
  const rsvpAcc = rsvp2>0 ? (act2/rsvp2*100).toFixed(1) : null;

  let html = `<h3>Overall</h3><div class="kpi-row">
    <div class="kpi"><div class="value total">${num(t2)}</div><div class="label">${latestYr} Total</div>
      ${yoy!==null?`<div class="change ${yoy>=0?'up':'down'}">${yoy>=0?'▲':'▼'} ${Math.abs(yoy)}% vs ${prevYr}</div>`:''}</div>
    <div class="kpi"><div class="value total">${num(t1)}</div><div class="label">${prevYr} Total</div></div>
    <div class="kpi"><div class="value total">${rsvp2>0?num(rsvp2):'—'}</div><div class="label">${latestYr} RSVPs</div></div>
    <div class="kpi"><div class="value total">${rsvpAcc?rsvpAcc+'%':'—'}</div><div class="label">RSVP Show Rate</div>
      ${rsvpAcc?`<div class="change ${rsvpAcc>=100?'up':'neutral'}">${rsvpAcc>=100?'More showed':'Fewer showed'}</div>`:''}</div>
  </div>`;

  campusOrder.forEach(campus => {
    const cd = d.filter(r=>r.campus===campus);
    if (cd.length === 0) return;
    const c2 = sumAtt(cd.filter(r=>r.year===latestYr));
    const c1 = sumAtt(cd.filter(r=>r.year===prevYr));
    const cr = sumRsvp(cd.filter(r=>r.year===latestYr&&r.rsvp>0));
    const ca = sumAtt(cd.filter(r=>r.year===latestYr&&r.rsvp>0));
    const cyoy = c1>0 ? ((c2-c1)/c1*100).toFixed(1) : null;
    const cra = cr>0 ? (ca/cr*100).toFixed(1) : null;
    const cls = campus.toLowerCase();
    html += `<h3>${campus}</h3><div class="kpi-row">
      <div class="kpi"><div class="value ${cls}">${num(c2)}</div><div class="label">${latestYr}</div>
        ${cyoy!==null?`<div class="change ${cyoy>=0?'up':'down'}">${cyoy>=0?'▲':'▼'} ${Math.abs(cyoy)}%</div>`:''}</div>
      <div class="kpi"><div class="value ${cls}">${num(c1)}</div><div class="label">${prevYr}</div></div>
      <div class="kpi"><div class="value ${cls}">${cr>0?num(cr):'—'}</div><div class="label">RSVPs</div></div>
      <div class="kpi"><div class="value ${cls}">${cra?cra+'%':'—'}</div><div class="label">Show Rate</div></div>
    </div>`;
  });
  section.innerHTML = html;
}

function renderYoYChart(d, grid) {
  const modeLabel = attMode === 'total' ? 'Total Attendance' : 'Auditorium Attendance';
  const c = card(`Year-over-Year ${modeLabel}`,'Grouped by year', true);
  const {wrap, canvas} = makeCanvas('yoyChart','tall');
  c.appendChild(wrap); grid.appendChild(c);
  const byYC = aggregate(d, ['year','campus']);
  const years = [...new Set(byYC.map(r=>r.year))].sort();
  const campuses = campusOrder.filter(cp => byYC.some(r=>r.campus===cp));
  const getVal = m => m ? (attMode==='total' && m.totalAttendance > 0 ? m.totalAttendance : m.attendance) : 0;
  charts.yoy = new Chart(canvas, {
    type:'bar',
    data:{ labels:years, datasets:campuses.map(cp => ({
      label:cp,
      data:years.map(y => { const m=byYC.find(r=>r.year===y&&r.campus===cp); return getVal(m); }),
      backgroundColor:campusColors[cp], borderRadius:6, barPercentage:0.7, categoryPercentage:0.8
    }))},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{position:'top',labels:{usePointStyle:true,pointStyle:'rectRounded',color:'#333'}},
        datalabels:{...dlDefaults}
      },
      scales:{y:{beginAtZero:true,ticks:{callback:v=>num(v)},grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}
    }
  });
}

function renderVsChart(d, grid) {
  const yr = selectedYear;
  const prevYr = String(+yr - 1);
  const mLabel = attMode === 'total' ? 'Total Attendance' : 'Auditorium Attendance';
  const c = card(`${yr} vs ${prevYr}`,'Campus Breakdown');
  const {wrap, canvas} = makeCanvas('vsChart','medium');
  c.appendChild(wrap); grid.appendChild(c);
  const dPrev = aggregate(d.filter(r=>r.year===prevYr),['campus']);
  const dCur = aggregate(d.filter(r=>r.year===yr),['campus']);
  const campuses = campusOrder.filter(cp => dPrev.some(r=>r.campus===cp)||dCur.some(r=>r.campus===cp));
  if (campuses.length === 0) return;
  const gv = m => m ? (attMode==='total' && m.totalAttendance > 0 ? m.totalAttendance : m.attendance) : 0;
  charts.vs = new Chart(canvas, {
    type:'bar',
    data:{ labels:campuses, datasets:[
      {label:prevYr,data:campuses.map(cp=>{const m=dPrev.find(r=>r.campus===cp);return gv(m);}),backgroundColor:'#bcc3ce',borderRadius:6,barPercentage:0.6},
      {label:yr,data:campuses.map(cp=>{const m=dCur.find(r=>r.campus===cp);return gv(m);}),backgroundColor:'#4a7f97',borderRadius:6,barPercentage:0.6}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'top',labels:{usePointStyle:true,pointStyle:'rectRounded',color:'#333'}},datalabels:{...dlDefaults}},
      scales:{y:{beginAtZero:true,ticks:{callback:v=>num(v)},grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}
    }
  });
}

function renderServiceVsLYChart(d, grid) {
  const c = card('Service-by-Service Breakdown','Select a year to see every service by campus and holiday', true);
  grid.appendChild(c);
  const allYears = [...new Set(d.map(r => r.year))].sort();
  const controls = document.createElement('div');
  controls.className = 'svc-controls';
  controls.innerHTML = `<label>Select Year:</label>`;
  const sel = document.createElement('select');
  sel.className = 'year-select';
  allYears.forEach(y => { const o=document.createElement('option'); o.value=y; o.textContent=y; if(y===svcSelectedYear)o.selected=true; sel.appendChild(o); });
  if (!allYears.includes(svcSelectedYear)) { svcSelectedYear = selectedYear || allYears[allYears.length-1]; sel.value = svcSelectedYear; }
  sel.onchange = () => { svcSelectedYear = sel.value; render(); };
  controls.appendChild(sel);
  c.appendChild(controls);
  const container = document.createElement('div');
  c.appendChild(container);
  const yr = svcSelectedYear;
  campusOrder.forEach(campus => {
    const cd = d.filter(r => r.campus === campus && r.year === yr);
    if (cd.length === 0) return;
    const hts = [...new Set(cd.map(r => holidayType(r.holiday)))];
    hts.forEach(ht => {
      const rows = cd.filter(r => holidayType(r.holiday) === ht).sort((a,b) => new Date(a.date+' '+a.time) - new Date(b.date+' '+b.time));
      if (rows.length === 0) return;
      const section = document.createElement('div');
      section.className = 'campus-section';
      section.innerHTML = `<h3 class="${campus.toLowerCase()}-label">${campus} — ${ht} (${yr})</h3>`;
      const {wrap, canvas} = makeCanvas(`svc_${campus}_${ht}_${yr}`.replace(/\s/g,''), 'medium');
      section.appendChild(wrap); container.appendChild(section);
      const labels = rows.map(r => `${r.day} ${r.service}\n${r.time}`);
      const attData = rows.map(r => attVal(r));
      const rsvpData = rows.map(r => r.rsvp);
      const hasRsvp = rsvpData.some(v => v > 0);
      const datasets = [{label: attMode === 'total' ? 'Total' : 'Auditorium',data:attData,backgroundColor:campusColors[campus],borderRadius:6,barPercentage:hasRsvp?0.6:0.7}];
      if (hasRsvp) datasets.unshift({label:'RSVP',data:rsvpData,backgroundColor:'#bcc3ce',borderRadius:6,barPercentage:0.6});
      charts[`svc_${campus}_${ht}_${yr}`] = new Chart(canvas, {
        type:'bar', data:{labels,datasets},
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{legend:{position:'top',labels:{usePointStyle:true,pointStyle:'rectRounded',color:'#333'}},datalabels:{...dlDefaults}},
          scales:{y:{beginAtZero:true,ticks:{callback:v=>num(v)},grid:{color:'#f0f0f0'}},x:{grid:{display:false},ticks:{font:{size:11}}}}
        }
      });
    });
  });
}

function renderCampusSubCharts(d, grid) {
  campusOrder.forEach(campus => {

    const hts = [...new Set(cd.map(r => holidayType(r.holiday)))];

    const c = card(`${campus} — Attendance by Service`,'Every service stacked by year', true);
    grid.appendChild(c);
    hts.forEach(ht => {
      const htRows = cd.filter(r => holidayType(r.holiday) === ht);
      if (htRows.length === 0) return;
      const section = document.createElement('div');
      section.className = 'campus-section';
      section.innerHTML = `<h3 class="${campus.toLowerCase()}-label">${ht}</h3>`;
      const {wrap, canvas} = makeCanvas(`sub_${campus}_${ht}`.replace(/\s/g,''), 'tall');
      section.appendChild(wrap); c.appendChild(section);
      const byYear = {};
      years.forEach(y => { byYear[y] = htRows.filter(r=>r.year===y).sort((a,b)=>new Date(a.date+' '+a.time)-new Date(b.date+' '+b.time)); });
      const maxSvc = Math.max(...Object.values(byYear).map(a=>a.length));
      const palette = ['#4a7f97','#7b6fa6','#c47a2e','#2e7d5b','#c0392b','#d4a017','#8e44ad','#2980b9'];
      const datasets = [];
      for (let i = 0; i < maxSvc; i++) {
        datasets.push({
          label:`Service ${i+1}`,
          data:years.map(y=>byYear[y][i]?attVal(byYear[y][i]):0),
          backgroundColor:palette[i%palette.length]+'cc', borderRadius:4, barPercentage:0.7, categoryPercentage:0.8
        });
      }
      charts[`sub_${campus}_${ht}`] = new Chart(canvas, {
        type:'bar', data:{labels:years, datasets},

          responsive:true, maintainAspectRatio:false,
          plugins:{
            legend:{position:'top',labels:{usePointStyle:true,pointStyle:'rectRounded',font:{size:11},color:'#333'}},

        }
      });
    });
  });
}

function renderGrowthChart(grid) {
  const c = card('Growth Trajectory — All Years','Filter by campus or holiday', true);
  grid.appendChild(c);

  const controls = document.createElement('div');
  controls.className = 'growth-controls';

  const modeLabel = document.createElement('label');
  modeLabel.textContent = 'View by:';
  controls.appendChild(modeLabel);

  const modeSel = document.createElement('select');
  modeSel.className = 'growth-select';
  [{v:'campus',t:'Campus'},{v:'holiday',t:'Holiday'}].forEach(o => {
    const opt = document.createElement('option');
    opt.value = o.v; opt.textContent = o.t;
    if (o.v === growthMode) opt.selected = true;
    modeSel.appendChild(opt);
  });

  const valLabel = document.createElement('label');
  valLabel.textContent = 'Select:';
  valLabel.style.marginLeft = '16px';

  const valSel = document.createElement('select');
  valSel.className = 'growth-select';

  function populateValSel() {
    valSel.innerHTML = '';
    const options = growthMode === 'campus'
      ? campusOrder.filter(cp => data.some(r => r.campus === cp))
      : [...new Set(data.map(r => holidayType(r.holiday)))];
    options.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      if (o === growthSelection) opt.selected = true;
      valSel.appendChild(opt);
    });
    if (!options.includes(growthSelection)) {
      growthSelection = options[0] || '';
      valSel.value = growthSelection;
    }
  }

  modeSel.onchange = () => {
    growthMode = modeSel.value;
    growthSelection = growthMode === 'campus' ? 'Mission' : 'Good Friday';
    populateValSel();
    renderGrowthChartInner(container);
  };
  valSel.onchange = () => {
    growthSelection = valSel.value;
    renderGrowthChartInner(container);
  };

  populateValSel();
  controls.appendChild(modeSel);
  controls.appendChild(valLabel);
  controls.appendChild(valSel);
  c.appendChild(controls);

  const container = document.createElement('div');
  c.appendChild(container);
  renderGrowthChartInner(container);
}

function renderGrowthChartInner(container) {
  container.innerHTML = '';
  if (charts.growth) { charts.growth.destroy(); delete charts.growth; }

  const {wrap, canvas} = makeCanvas('growthChart','tall');
  container.appendChild(wrap);

  const allYears = [...new Set(data.map(r=>r.year))].sort();
  const hTypes = [...new Set(data.map(r=>holidayType(r.holiday)))];
  const dashMap = {'Good Friday':[],'Easter':[5,5],'Christmas Eve':[2,3]};
  const mLabel = attMode === 'total' ? 'Total Attendance' : 'Auditorium Attendance';

  const gv = m => m ? (attMode==='total' && m.totalAttendance > 0 ? m.totalAttendance : m.attendance) : null;

  let datasets = [];

  if (growthMode === 'campus') {
    const campus = growthSelection;
    const gd = aggregate(data.filter(r => r.campus === campus), ['year','ht']);
    hTypes.forEach(ht => {
      const pts = allYears.map(y => { const m=gd.find(r=>r.year===y&&r.ht===ht); return m ? gv(m) : null; });
      if (pts.some(p=>p!==null)) {
        const color = ht==='Good Friday'?'#4a7f97':ht==='Easter'?'#2e7d5b':'#c47a2e';
        datasets.push({
          label:ht, data:pts, borderColor:color, backgroundColor:color+'33',
          borderDash:dashMap[ht]||[], pointRadius:5, pointHoverRadius:8, tension:0.3, spanGaps:true, fill:false
        });
      }
    });
  } else {
    const ht = growthSelection;
    const gd = aggregate(data.filter(r => holidayType(r.holiday) === ht), ['year','campus']);
    campusOrder.forEach(cp => {
      const pts = allYears.map(y => { const m=gd.find(r=>r.year===y&&r.campus===cp); return m ? gv(m) : null; });
      if (pts.some(p=>p!==null)) {
        datasets.push({
          label:cp, data:pts, borderColor:campusColors[cp], backgroundColor:campusColors[cp]+'33',
          borderDash:[], pointRadius:5, pointHoverRadius:8, tension:0.3, spanGaps:true, fill:false
        });
      }
    });
  }

  charts.growth = new Chart(canvas, {
    type:'line', data:{labels:allYears, datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        datalabels:{display:false},
        legend:{position:'right', align:'start',labels:{usePointStyle:true, color:'#1a1a1a', padding:14, font:{size:12,weight:'600'}}}
      },
      scales:{y:{beginAtZero:true,ticks:{callback:v=>num(v)},grid:{color:'#f0f0f0'}},x:{grid:{display:false}}}
    }
  });
}

function getCampusColor(eventName) {
  if (eventName.startsWith('Mission')) return '#4a7f97';
  if (eventName.startsWith('Edinburg')) return '#7b6fa6';
  if (eventName.includes('Español') || eventName.includes('en Español')) return '#c47a2e';
  return '#6b7280';
}

function getEventCategory(eventName) {
  const lower = eventName.toLowerCase();
  if (lower.includes('growth track') || lower.includes('vía de crecimiento')) return 'Growth Track';
  if (lower.includes('sisterhood') || lower.includes('brotherhood') || lower.includes('girls night')) return 'Special Events';
  if (lower.includes('rooted') || lower.includes('reengage') || lower.includes('practicing the way') || lower.includes('griefshare') || lower.includes('re:generation')) return 'Programs';
  if (lower.includes('baptism')) return 'Baptisms';
  if (lower.includes('summer camp') || lower.includes('splendor conference')) return 'Camp & Conference';
  return 'Other';
}

function renderDreamTeam() {
  const kpiSection = document.getElementById('dtKpiSection');
  const grid = document.getElementById('dtGrid');
  kpiSection.innerHTML = '';
  grid.innerHTML = '';

  // Destroy old charts
  ['dtFunnel','dtByEvent','dtPositions','dtServiceTypes'].forEach(id => {
    if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  });

  const totalReg = dtStep3Events.reduce((s,e) => s + e.registrants, 0);
  const totalServing = dtStep3Events.reduce((s,e) => s + e.serving, 0);
  const notServing = totalReg - totalServing;
  const overallPct = (totalServing / totalReg * 100).toFixed(1);

  // KPIs
  kpiSection.innerHTML = `
    <h3>Growth Track Step 3 → Dream Team Pipeline</h3>
    <div class="kpi-row">
      <div class="kpi"><div class="value total">${num(totalReg)}</div><div class="label">Step 3 Completions</div><div class="change neutral">All campuses combined</div></div>
      <div class="kpi"><div class="value" style="color:#2e7d5b">${num(totalServing)}</div><div class="label">Now on Dream Team</div><div class="change up">Currently scheduled to serve</div></div>
      <div class="kpi"><div class="value" style="color:#c0392b">${num(notServing)}</div><div class="label">Not Serving</div><div class="change down">No service record found</div></div>
      <div class="kpi"><div class="value total">${overallPct}%</div><div class="label">Conversion Rate</div><div class="change ${overallPct >= 25 ? 'up' : 'neutral'}">Step 3 → Dream Team</div></div>
    </div>`;

  // ── Card 1: Funnel Visualization ──
  const c1 = card('Step 3 → Dream Team Funnel','How many Step 3 completions became active volunteers?', true);
  const funnelHtml = `
    <div style="max-width:800px; margin:20px auto;">
      <div class="funnel-bar">
        <div class="bar-label">Completed Step 3</div>
        <div class="bar-track"><div class="bar-fill" style="width:100%; background:var(--accent);">${num(totalReg)}</div></div>
        <div class="bar-value">${num(totalReg)}</div>
      </div>
      <div class="funnel-bar">
        <div class="bar-label">Serving on Dream Team</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(totalServing/totalReg*100).toFixed(0)}%; background:#2e7d5b;">${num(totalServing)}</div></div>
        <div class="bar-value">${num(totalServing)} (${overallPct}%)</div>
      </div>
      <div class="funnel-bar">
        <div class="bar-label">Not Serving</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(notServing/totalReg*100).toFixed(0)}%; background:#c0392b;">${num(notServing)}</div></div>
        <div class="bar-value">${num(notServing)} (${(notServing/totalReg*100).toFixed(1)}%)</div>
      </div>
    </div>
    <div class="conversion-card" id="dtCampusCards"></div>`;
  const fDiv = document.createElement('div');
  fDiv.innerHTML = funnelHtml;
  c1.appendChild(fDiv);
  grid.appendChild(c1);

  // Build campus cards without nested template literals
  const cardsContainer = document.getElementById('dtCampusCards');
  ['Mission','Edinburg','Spanish'].forEach(campus => {
    const evts = dtStep3Events.filter(e => e.campus === campus);
    const cReg = evts.reduce((s,e) => s + e.registrants, 0);
    const cServ = evts.reduce((s,e) => s + e.serving, 0);
    const cPct = cReg > 0 ? (cServ/cReg*100).toFixed(1) : '0';
    const color = campusColors[campus] || '#6b7280';
    const block = document.createElement('div');
    block.className = 'campus-block';
    block.innerHTML = '<div class="campus-name" style="color:' + color + '">' + campus + '</div>'
      + '<div class="big-num" style="color:' + color + '">' + cPct + '%</div>'
      + '<div class="detail">' + cServ + ' of ' + cReg + ' serving</div>';
    cardsContainer.appendChild(block);
  });

  // ── Card 2: Conversion by Step 3 Event (bar chart) ──
  const evtsWithData = dtStep3Events.filter(e => e.registrants > 0);
  const c2 = card('Conversion Rate by Step 3 Event','Percentage of Step 3 registrants now serving on Dream Team');
  const {wrap:w2, canvas:cv2} = makeCanvas('dtByEvent','tall');
  c2.appendChild(w2); grid.appendChild(c2);

  charts.dtByEvent = new Chart(cv2, {
    type:'bar',
    data:{
      labels: evtsWithData.map(e => e.name.replace(/Growth Track Step 3|Vía de Crecimiento Paso 3/g, 'Step 3').replace(/\(|\)/g,'')),
      datasets:[
        {label:'Registrants',data:evtsWithData.map(e=>e.registrants),backgroundColor:'#bcc3ce',borderRadius:6,barPercentage:0.6},
        {label:'Serving',data:evtsWithData.map(e=>e.serving),backgroundColor:evtsWithData.map(e=>campusColors[e.campus]||'#6b7280'),borderRadius:6,barPercentage:0.6}
      ]
    },
    options:{
      indexAxis:'y',
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{position:'top',labels:{usePointStyle:true,pointStyle:'rectRounded',color:'#333'}},
        datalabels:{anchor:'end',align:'end',color:'#444',font:{size:10,weight:'600'},formatter:v=>v>0?num(v):'',display:ctx=>ctx.dataset.data[ctx.dataIndex]>0},
        tooltip:{callbacks:{afterBody:items=>{const idx=items[0].dataIndex;const e=evtsWithData[idx];return e.registrants>0?'Conversion: '+e.pct+'%':'';}}}
      },
      scales:{
        x:{beginAtZero:true,ticks:{callback:v=>num(v)},grid:{color:'#f0f0f0'}},
        y:{grid:{display:false},ticks:{font:{size:11}}}
      }
    }
  });

  // ── Card 3: Top Dream Team Positions (doughnut) ──
  const c3 = card('Where Step 3 Grads Serve','Dream Team positions held by Step 3 completions');
  const {wrap:w3, canvas:cv3} = makeCanvas('dtPositions','medium');
  c3.appendChild(w3); grid.appendChild(c3);

  const posColors = ['#4a7f97','#7b6fa6','#c47a2e','#2e7d5b','#c0392b','#d4a017','#8e44ad','#2980b9','#16a085','#e74c3c','#3498db','#f39c12','#1abc9c','#9b59b6'];
  charts.dtPositions = new Chart(cv3, {
    type:'doughnut',
    data:{
      labels: dtPositions.map(p=>p.position),
      datasets:[{data:dtPositions.map(p=>p.count),backgroundColor:posColors,borderColor:'#fff',borderWidth:2}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'right',labels:{usePointStyle:true,color:'#1a1a1a',padding:10,font:{size:11}}},
        datalabels:{formatter:(v,ctx)=>{const total=ctx.dataset.data.reduce((a,b)=>a+b,0);const pct=((v/total)*100).toFixed(0);return pct>4?pct+'%':'';},color:'#fff',font:{weight:'bold',size:11}}
      }
    }
  });

  // ── Card 4: Service Types (horizontal bar) ──
  const c4 = card('Service Types','Which ministry areas Step 3 grads serve in');
  const {wrap:w4, canvas:cv4} = makeCanvas('dtServiceTypes','medium');
  c4.appendChild(w4); grid.appendChild(c4);

  charts.dtServiceTypes = new Chart(cv4, {
    type:'bar',
    data:{
      labels: dtServiceTypes.map(s=>s.type),
      datasets:[{label:'People',data:dtServiceTypes.map(s=>s.count),backgroundColor:'#4a7f97',borderRadius:6,barPercentage:0.7}]
    },
    options:{
      indexAxis:'y',
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        datalabels:{anchor:'end',align:'end',color:'#444',font:{size:10,weight:'600'},formatter:v=>num(v),display:true}
      },
      scales:{
        x:{beginAtZero:true,ticks:{callback:v=>num(v)},grid:{color:'#f0f0f0'}},
        y:{grid:{display:false},ticks:{font:{size:11}}}
      }
    }
  });

  // ── Card 5: Detailed Table ──
  const c5 = card('Step 3 Event Detail','Click any event to see individual registrants', true);
  let tHtml = '<table class="dt-table"><thead><tr><th>Event</th><th class="number">Registrants</th><th class="number">Serving</th><th class="number">Not Serving</th><th class="number">Conversion</th></tr></thead><tbody>';

  evtsWithData.sort((a,b) => b.pct - a.pct).forEach((e, idx) => {
    const badgeCls = e.pct >= 30 ? 'high' : e.pct >= 15 ? 'mid' : 'low';
    tHtml += '<tr class="event-row" data-idx="' + idx + '" onclick="togglePeople(' + idx + ')">';
    tHtml += '<td>' + e.name + '</td>';
    tHtml += '<td class="number">' + e.registrants + '</td>';
    tHtml += '<td class="number">' + e.serving + '</td>';
    tHtml += '<td class="number">' + (e.registrants - e.serving) + '</td>';
    tHtml += '<td class="number"><span class="badge ' + badgeCls + '">' + e.pct + '%</span></td>';
    tHtml += '</tr>';
    
    // Person rows (hidden by default)
    const people = dtPeople[e.name] || [];
    // Sort: serving first, then alphabetical
    const sorted = [...people].filter(p => p.name).sort((a,b) => {
      if (a.lastScheduled && !b.lastScheduled) return -1;
      if (!a.lastScheduled && b.lastScheduled) return 1;
      return (a.name || '').localeCompare(b.name || '');
    });
    
    tHtml += '</tbody><tbody class="person-rows" id="people-' + idx + '">';
    sorted.forEach(p => {
      tHtml += '<tr class="person-row">';
      tHtml += '<td>' + (p.name || '—') + (p.lastScheduled ? ' <span class="serving-badge">Serving</span>' : '') + '</td>';
      tHtml += '<td>' + (p.phone || '—') + '</td>';
      tHtml += '<td>' + (p.lastScheduled || '') + '</td>';
      tHtml += '<td></td>';
      tHtml += '<td></td>';
      tHtml += '</tr>';
    });
    tHtml += '</tbody><tbody>';
  });

  tHtml += '</tbody></table>';
  tHtml += '<div class="subtitle" style="margin-top:16px;">Data from Planning Center Online via Qlik · PCO People Dashboard · As of April 2026</div>';
  const tDiv = document.createElement('div');
  tDiv.innerHTML = tHtml;
  c5.appendChild(tDiv);
  grid.appendChild(c5);
}


function togglePeople(idx) {
  const row = document.querySelector('.event-row[data-idx="' + idx + '"]');
  const people = document.getElementById('people-' + idx);
  if (row && people) {
    row.classList.toggle('expanded');
    people.classList.toggle('visible');
  }
}

render();
renderEventRegistrations();
renderDreamTeam();
